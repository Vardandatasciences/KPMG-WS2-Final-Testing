# Server only - no code, just pull image and run
# Create .env with your paths (see .env.example), then:
#   docker compose pull
#   docker compose up -d

version: '3.8'

services:
  backend:
    image: 480940871468.dkr.ecr.ap-south-1.amazonaws.com/grc_tprm:latest
    container_name: grc_backend
    ports:
      - "8000:8000"
    volumes:
      - ${MEDIA_ROOT}:/app/MEDIA_ROOT
      - ${TEMP_MEDIA_ROOT}:/app/TEMP_MEDIA_ROOT
      - ${REPORTS}:/app/Reports
    env_file:
      - ${ENV_FILE}
    environment:
      - PYTHONUNBUFFERED=1
      - DJANGO_SETTINGS_MODULE=backend.settings
    restart: unless-stopped
