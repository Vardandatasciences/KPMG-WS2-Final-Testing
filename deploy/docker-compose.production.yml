# RiskAvaire — production-style stack (frontend nginx + Django API)
# Matches grc_frontend/nginx.docker.conf upstream name: grc_tprm_backend
#
# From repo root:
#   docker compose -f deploy/docker-compose.production.yml --env-file grc_backend/.env up -d --build
#
# Or from deploy/:
#   docker compose -f docker-compose.production.yml --env-file ../grc_backend/.env up -d --build
#
# Ensure grc_backend/.env exists on the server (DB, secrets, DEBUG=false, etc.).

services:
  riskavaire_backend_svc:
    build:
      context: ../grc_backend
      dockerfile: Dockerfile
    container_name: grc_riskavaire_backend_final
    # Do not use Django runserver in production
    command: >
      gunicorn backend.wsgi:application
      --bind 0.0.0.0:8000
      --workers 4
      --threads 2
      --timeout 120
      --access-logfile -
      --error-logfile -
    env_file:
      - ../grc_backend/.env
    environment:
      PYTHONUNBUFFERED: "1"
      DJANGO_SETTINGS_MODULE: backend.settings
    volumes:
      - grc_riskavaire_media:/app/MEDIA_ROOT
      - ../grc_backend/TEMP_MEDIA_ROOT:/app/TEMP_MEDIA_ROOT
      - grc_riskavaire_reports:/app/Reports
    expose:
      - "8000"
    ports:
      - "8006:8000"
    restart: unless-stopped

  riskavaire_frontend_svc:
    build:
      context: ../grc_frontend
      dockerfile: Dockerfile
      # Do not pass empty VUE_APP_* / VITE_* args — that used to override .env.production and embed 127.0.0.1:8000.
      # To override: docker compose build --build-arg VUE_APP_API_BASE_URL=https://riskavaire.vardaands.com frontend
    container_name: grc_riskavaire_frontend_final
    ports:
      # Host :80 is often already used by system nginx. Default 8080; proxy from host nginx, or set FRONTEND_HTTP_PORT=80 if unused.
      - "8086:80"
    depends_on:
      - riskavaire_backend_svc
    restart: unless-stopped

volumes:
  grc_riskavaire_media:
  grc_riskavaire_temp_media:
  grc_riskavaire_reports:
