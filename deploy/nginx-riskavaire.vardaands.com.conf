# RiskAvaire GRC + TPRM — BARE-METAL nginx (static files on disk + gunicorn on HOST :8000)
#
# NOT for Docker Compose: if the app runs in Docker, gunicorn is NOT on 127.0.0.1:8000 and
# /opt/.../dist may be empty → /api/ breaks and try_files can 500. Use instead:
#   deploy/nginx-riskavairegrc.vardaands.com.docker-host.conf
#
# Layout:
#   • This file → /etc/nginx/sites-available/riskavairegrc.vardaands.com
#   • Built SPA → /opt/apps/riskavairegrc/frontend/dist (npm run build:all output)
#
# DNS: A record riskavairegrc.vardaands.com → your VPS IP
# Backend: gunicorn bound to 127.0.0.1:8000 on the HOST (not inside Docker)
#
# TLS: after HTTP works, run certbot (commands in deploy comments below) and either let
# certbot edit this file or uncomment the second server block and ssl_* lines.
#
# Security headers: keep in sync with /etc/nginx/snippets/security-headers.conf on the VPS
# (see deploy/nginx-snippets/security-headers.conf in the repo).

upstream riskavairegrc_django {
    server 127.0.0.1:8000;
    keepalive 32;
}

# --- Phase 1: HTTP only (use until certificates exist; certbot can upgrade later) ---
server {
    listen 80;
    listen [::]:80;
    server_name riskavaire.vardaands.com;

    include /etc/nginx/snippets/security-headers.conf;

    # Hide Nginx version from Server header (banner-disclosure fix)
    server_tokens off;

    client_max_body_size 100M;

    root /opt/apps/riskavairegrc/frontend/dist;
    index index.html;

    location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_pass http://riskavairegrc_django;
    }

    location /tprm/ {
        root /opt/apps/riskavairegrc/frontend/dist;
        try_files $uri $uri/ /tprm/index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# --- Phase 2: after `sudo certbot --nginx -d riskavairegrc.vardaands.com` ---
# Certbot usually adds a listen 443 server and can add redirect from :80.
# Or uncomment and fill paths manually:
#
# server {
#     listen 443 ssl http2;
#     listen [::]:443 ssl http2;
#     server_name riskavaire.vardaands.com;
#
#     # Hide Nginx version from Server header (banner-disclosure fix)
#     server_tokens off;
#
#     ssl_certificate     /etc/letsencrypt/live/riskavairegrc.vardaands.com/fullchain.pem;
#     ssl_certificate_key /etc/letsencrypt/live/riskavairegrc.vardaands.com/privkey.pem;
#     include /etc/letsencrypt/options-ssl-nginx.conf;
#     ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
#     ... same location /api/, /tprm/, / as above ...
# }
#
# Certbot install (Debian/Ubuntu):
#   sudo apt-get install -y certbot python3-certbot-nginx
#   sudo certbot --nginx -d riskavairegrc.vardaands.com
