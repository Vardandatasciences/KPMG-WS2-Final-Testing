# Snippet for *host* nginx when the Docker frontend publishes 127.0.0.1:8080 → container :80
# (compose default FRONTEND_HTTP_PORT=8080). Merge into your server { } for riskavaire.vardaands.com.
#
# If you instead stop host nginx and give Docker port 80: FRONTEND_HTTP_PORT=80 and you do not need this.
#
# In the same server { }, include shared headers once (not inside this location block):
#   include /etc/nginx/snippets/security-headers.conf;

client_max_body_size 100M;

location / {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # So the Docker frontend and Django see HTTPS when users use https://
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    # Blank Connection avoids odd failures proxying plain HTTP to the Docker nginx
    proxy_set_header Connection "";
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
    proxy_pass http://127.0.0.1:8080;
}
