# RiskAvaire — HOST nginx when the stack runs in Docker (compose publishes frontend :8080 → container :80).
#
# Use this INSTEAD of nginx-test-riskavaire.vardaands.com.conf (bare-metal).
# Reason:
#   • Gunicorn is NOT on host 127.0.0.1:8000 — it is only reachable inside Docker as grc_tprm_backend:8000.
#   • The frontend container nginx already proxies /api/ to that backend.
#   • So host nginx must send ALL paths (/, /tprm/, /api/, /js/, …) to http://127.0.0.1:8080.
#
# Install:
#   sudo cp deploy/nginx-test-riskavaire.vardaands.com.docker-host.conf \
#     /etc/nginx/sites-available/test-riskavaire.vardaands.com
#   sudo ln -sf /etc/nginx/sites-available/test-riskavaire.vardaands.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS: set ssl_certificate paths (e.g. after certbot) or run: sudo certbot --nginx -d test-riskavaire.vardaands.com

upstream riskavairegrc_docker_frontend {
    server 127.0.0.1:8085;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name test-riskavaire.vardaands.com;

    include /etc/nginx/snippets/security-headers.conf;
    client_max_body_size 100M;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_pass http://riskavairegrc_docker_frontend;
    }
}

