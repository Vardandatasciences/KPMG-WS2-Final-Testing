name: CI/CD - GRC & TPRM (2 Images)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  # Docker network name
  DOCKER_NETWORK: grc_tprm_network
  # Ports
  FRONTEND_PORT: 8080
  BACKEND_PORT: 8000
  # ECR repository details (adjust if needed)
  AWS_REGION: ap-south-1
  ECR_REGISTRY: 480940871468.dkr.ecr.ap-south-1.amazonaws.com
  # NOTE: GitHub does not expand ${ECR_REGISTRY} inside env values,
  # so we hard-code the full image URIs here.
  FRONTEND_IMAGE: 480940871468.dkr.ecr.ap-south-1.amazonaws.com/grc_tprm_frontend:latest
  BACKEND_IMAGE: 480940871468.dkr.ecr.ap-south-1.amazonaws.com/grc_tprm_backend:latest

jobs:
  # ============================================
  # JOB 1: Setup (Create Docker Network)
  # ============================================
  setup:
    runs-on: self-hosted
    permissions:
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Docker network
        run: |
          if [ "$(docker network ls -q -f name=${DOCKER_NETWORK})" ]; then
            echo "Network ${DOCKER_NETWORK} already exists"
          else
            docker network create ${DOCKER_NETWORK}
            echo "Created network ${DOCKER_NETWORK}"
          fi

  # ============================================
  # JOB 2: Frontend Build & Deploy (Parallel)
  # ============================================
  frontend:
    runs-on: self-hosted
    needs: setup
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history to ensure latest code

      - name: Show current commit
        run: |
          echo "Building from commit: $(git rev-parse HEAD)"
          echo "Commit message: $(git log -1 --pretty=%B)"

      - name: Clean up Docker to free space
        run: |
          echo "Cleaning up Docker to free disk space..."
          docker container prune -f || true
          docker image prune -a -f || true
          docker volume prune -f || true
          docker builder prune -a -f || true
          echo "Disk space after cleanup:"
          df -h /

      - name: Remove old Frontend image
        run: |
          docker rmi grc_tprm_frontend:latest || true
          docker rmi "${FRONTEND_IMAGE}" || true

      - name: Verify API configuration before build
        working-directory: grc_frontend
        run: |
          echo "=== Checking api.js configuration ==="
          if [ -f "src/config/api.js" ]; then
            echo "File exists. Showing ENVIRONMENT setting:"
            grep -A 3 "ENVIRONMENT" src/config/api.js || echo "Could not find ENVIRONMENT"
            echo ""
            echo "Showing API_URLS:"
            grep -A 5 "API_URLS" src/config/api.js | head -10 || echo "Could not find API_URLS"
            echo ""
            echo "Current API_BASE_URL will be:"
            grep "API_BASE_URL" src/config/api.js || echo "Could not find API_BASE_URL"
          else
            echo "ERROR: api.js file not found!"
            exit 1
          fi

      - name: Build Combined Frontend Docker image (GRC + TPRM)
        working-directory: grc_frontend
        run: |
          # Get commit hash and date for build args
          COMMIT_HASH=$(git rev-parse HEAD)
          BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          CACHE_BUST=$(date +%s)
          
          echo "Building with commit: $COMMIT_HASH"
          echo "Build date: $BUILD_DATE"
          echo "Cache bust: $CACHE_BUST"
          
          # Build with build args to force fresh build
          docker build \
            --no-cache \
            --pull \
            --build-arg BUILD_DATE="$BUILD_DATE" \
            --build-arg GIT_COMMIT="$COMMIT_HASH" \
            --build-arg CACHE_BUST="$CACHE_BUST" \
            -t grc_tprm_frontend:latest .

      - name: Tag Frontend image for ECR
        run: |
          docker tag grc_tprm_frontend:latest "${FRONTEND_IMAGE}"

      - name: Push Frontend to ECR
        run: |
          aws ecr get-login-password --region ${AWS_REGION} | docker login --username AWS --password-stdin ${ECR_REGISTRY}
          docker push "${FRONTEND_IMAGE}"
          echo "Frontend image pushed to ECR successfully"

      - name: Verify built image contains correct API URL
        run: |
          echo "=== Verifying API URL in built image ==="
          # Create a temporary container to inspect built files
          TEMP_CONTAINER=$(docker create grc_tprm_frontend:latest)
          docker cp ${TEMP_CONTAINER}:/var/www/html/grc ./temp_dist_check || echo "Could not copy dist"
          docker rm ${TEMP_CONTAINER} || true
          
          if [ -d "./temp_dist_check" ]; then
            echo "Checking built JavaScript files for API URLs..."
            find ./temp_dist_check -name "*.js" -type f | head -3 | while read file; do
              echo "--- Checking $file ---"
              grep -o "grc-backend.vardaands.com\|127.0.0.1:8000" "$file" | head -3 || echo "No API URL found in this file"
            done
            rm -rf ./temp_dist_check
          else
            echo "WARNING: Could not extract dist folder for verification"
          fi

      - name: Deploy Frontend container
        run: |
          # Stop and remove existing container if it exists
          if [ "$(docker ps -aq -f name=grc_tprm_frontend)" ]; then
            echo "Stopping and removing existing frontend container..."
            docker stop grc_tprm_frontend || true
            docker rm grc_tprm_frontend || true
          fi

          # Verify the image exists
          echo "Verifying frontend image exists..."
          docker images | grep grc_tprm_frontend || echo "WARNING: Image not found!"

          # Run new container on Docker network, expose port 80
          echo "Starting new frontend container..."
          docker run -d \
            --name grc_tprm_frontend \
            --network ${DOCKER_NETWORK} \
            -p ${FRONTEND_PORT}:80 \
            --restart unless-stopped \
            grc_tprm_frontend:latest

          # Verify container is running
          sleep 2
          docker ps | grep grc_tprm_frontend || echo "WARNING: Container not running!"
          
          # Show container logs to verify it started correctly
          echo "=== Container startup logs ==="
          docker logs grc_tprm_frontend --tail 20 || true

      - name: Check Frontend health (GRC)
        run: |
          sleep 5
          curl -fsS http://127.0.0.1:${FRONTEND_PORT}/ || echo "GRC Frontend check failed (non-blocking)."

      - name: Check Frontend health (TPRM)
        run: |
          sleep 2
          curl -fsS http://127.0.0.1:${FRONTEND_PORT}/tprm || echo "TPRM Frontend check failed (non-blocking)."

  # ============================================
  # JOB 3: Backend Build & Deploy (Parallel)
  # ============================================
  backend:
    runs-on: self-hosted
    needs: setup
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history to ensure latest code

      - name: Show current commit
        run: |
          echo "Building from commit: $(git rev-parse HEAD)"
          echo "Commit message: $(git log -1 --pretty=%B)"

      - name: Clean up Docker to free space
        run: |
          echo "Cleaning up Docker to free disk space..."
          docker container prune -f || true
          docker image prune -a -f || true
          docker volume prune -f || true
          docker builder prune -a -f || true
          echo "Disk space after cleanup:"
          df -h /

      - name: Remove old Backend image
        run: |
          docker rmi grc_tprm_backend:latest || true
          docker rmi "${BACKEND_IMAGE}" || true

      - name: Build Backend Docker image
        working-directory: grc_backend
        run: |
          docker build --no-cache --pull -t grc_tprm_backend:latest .

      - name: Tag Backend image for ECR
        run: |
          docker tag grc_tprm_backend:latest "${BACKEND_IMAGE}"

      - name: Push Backend to ECR
        run: |
          aws ecr get-login-password --region ${AWS_REGION} | docker login --username AWS --password-stdin ${ECR_REGISTRY}
          docker push "${BACKEND_IMAGE}"
          echo "Backend image pushed to ECR successfully"

      - name: Deploy Backend container
        run: |
          # Stop and remove existing container if it exists
          if [ "$(docker ps -aq -f name=grc_tprm_backend)" ]; then
            echo "Stopping and removing existing backend container..."
            docker stop grc_tprm_backend || true
            docker rm grc_tprm_backend || true
          fi

          # Verify the image exists
          echo "Verifying backend image exists..."
          docker images | grep grc_tprm_backend || echo "WARNING: Image not found!"

          # Run new container on Docker network
          # Uses existing config.env and host volumes under /home/ec2-user
          echo "Starting new backend container..."
          docker run -d \
            --name grc_tprm_backend \
            --network ${DOCKER_NETWORK} \
            --env-file /home/ec2-user/config.env \
            -v /home/ec2-user/MEDIA_ROOT:/app/MEDIA_ROOT \
            -v /home/ec2-user/TEMP_MEDIA_ROOT:/app/TEMP_MEDIA_ROOT \
            -v /home/ec2-user/Reports:/app/Reports \
            --restart unless-stopped \
            grc_tprm_backend:latest

          # Verify container is running
          sleep 2
          docker ps | grep grc_tprm_backend || echo "WARNING: Container not running!"

      - name: Check Backend health
        run: |
          sleep 5
          curl -fsS http://127.0.0.1:${BACKEND_PORT}/ || echo "Backend health check failed (non-blocking)."

  # ============================================
  # JOB 4: Final Verification (After Both Deploy)
  # ============================================
  verify:
    runs-on: self-hosted
    needs: [frontend, backend]
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show all running containers
        run: |
          docker ps -a
          echo "--- Network Info ---"
          docker network inspect ${DOCKER_NETWORK} || true

      - name: Verify Frontend via API proxy
        run: |
          sleep 3
          echo "Testing Frontend → Backend connection..."
          curl -fsS http://127.0.0.1:${FRONTEND_PORT}/api/ || echo "API proxy check failed (non-blocking)."

      - name: Check container logs
        if: failure()
        run: |
          echo "=== Frontend Logs ==="
          docker logs grc_tprm_frontend --tail 50 || true
          echo "=== Backend Logs ==="
          docker logs grc_tprm_backend --tail 50 || true
