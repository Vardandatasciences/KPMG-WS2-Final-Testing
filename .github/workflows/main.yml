name: CI/CD - GRC & TPRM

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    # This must match the labels of your EC2 self-hosted runner
    runs-on: self-hosted

    permissions:
      contents: read

    env:
      # Adjust if your backend listens on a different port internally
      BACKEND_PORT: 8000
      # Root paths used by nginx.conf
      GRC_WEB_ROOT: /var/www/html/grc
      TPRM_WEB_ROOT: /var/www/html/tprm
      # Existing backend image in ECR (adjust if needed)
      BACKEND_IMAGE: 480940871468.dkr.ecr.ap-south-1.amazonaws.com/grc_tprm:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------
      # FRONTEND: GRC + TPRM
      # -------------------------
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            grc_frontend/package-lock.json
            grc_frontend/tprm_frontend/package-lock.json

      - name: Install frontend dependencies (GRC root)
        working-directory: grc_frontend
        run: npm ci

      - name: Install frontend dependencies (TPRM sub-app)
        working-directory: grc_frontend/tprm_frontend
        run: npm ci

      - name: Build GRC + TPRM frontends
        working-directory: grc_frontend
        env:
          NODE_ENV: production
        run: |
          # Builds:
          # - GRC -> grc_frontend/dist
          # - TPRM -> grc_frontend/tprm_frontend/dist
          npm run build:all

      - name: Deploy GRC frontend to nginx web root
        run: |
          mkdir -p "$GRC_WEB_ROOT"
          rsync -av --delete grc_frontend/dist/ "$GRC_WEB_ROOT"/

      - name: Deploy TPRM frontend to nginx web root
        run: |
          mkdir -p "$TPRM_WEB_ROOT"
          rsync -av --delete grc_frontend/tprm_frontend/dist/ "$TPRM_WEB_ROOT"/

      # -------------------------
      # BACKEND: Django via existing Docker image (no docker-compose)
      # -------------------------
      - name: Pull backend Docker image from ECR
        run: |
          # If your instance is already logged in to ECR, this will just pull latest.
          # Otherwise, you can add an aws ecr get-login-password step before this.
          docker pull "${BACKEND_IMAGE}" || echo "Pull failed, using local image if available."

      - name: Restart backend container (grc_tprm)
        run: |
          # Stop and remove existing container if it exists
          if [ "$(docker ps -aq -f name=grc_tprm)" ]; then
            docker stop grc_tprm || true
            docker rm grc_tprm || true
          fi

          # Run new container
          # Uses existing config.env and host volumes under /home/ec2-user
          docker run -d \
            --name grc_tprm \
            --env-file /home/ec2-user/config.env \
            -p ${BACKEND_PORT}:8000 \
            -v /home/ec2-user/MEDIA_ROOT:/app/MEDIA_ROOT \
            -v /home/ec2-user/TEMP_MEDIA_ROOT:/app/TEMP_MEDIA_ROOT \
            -v /home/ec2-user/Reports:/app/Reports \
            "${BACKEND_IMAGE}"

      - name: Show running containers
        run: docker ps -a

      # -------------------------
      # (Optional) Basic health checks
      # -------------------------
      - name: Check backend health (HTTP)
        run: |
          # Simple curl check against nginx -> Django stack.
          # Adjust hostname/URL if needed (for HTTPS or custom domain).
          curl -fsS http://127.0.0.1:${BACKEND_PORT}/ || echo "Backend HTTP check failed (non-blocking)."


